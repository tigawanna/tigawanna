packages:
  - apps/*
  - packages/*

onlyBuiltDependencies:
  - core-js
  - es5-ext
  - esbuild
  - futurescript
  - protobufjs
  - sharp
  - workerd
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
