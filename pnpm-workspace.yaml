packages:
  - apps/*
  - packages/*

onlyBuiltDependencies:
  - core-js
  - es5-ext
  - esbuild
  - futurescript
  - protobufjs
  - sharp
  - workerd
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  typescript: ^7.0.2
  lucide-react: ^0.561.0
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.3.3
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
